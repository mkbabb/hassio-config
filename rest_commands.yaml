remote_light_command:
    url: "http://localhost:1880/endpoint/remote/"
    method: POST
    headers:
        Content-Type: application/json
    payload: >
        {
           "domain": "{{ domain }}",
           "service": "{{ service }}",
           "target": {
             "controller_id": "{{ controller_id }}",
             "device": "{{ device }}",
             "entity_id": "{{ entity_id }}"
          },
          "data": {
            "state": "{{ state }}",
            "brightness_pct": "{{ brightness_pct }}",
            "color_temp": "{{ color_temp }}"
          }
        }
remote_fan_command:
    url: "http://localhost:1880/endpoint/remote/"
    method: POST
    headers:
        Content-Type: application/json
    payload: >
        {
           "domain": "{{ domain }}",
           "service": "{{ service }}",
           "target": {
             "controller_id": "{{ controller_id }}",
             "device": "{{ device }}",
             "entity_id": "{{ entity_id }}"
          },
          "data": {
            "state": "{{ state }}",
            "percentage": "{{ percentage }}",
            "oscillating": "{{ oscillating }}"
          }
        }
schedule_update:
    url: "http://localhost:1880/endpoint/schedules/{{ name }}"
    method: PUT
    headers:
        Content-Type: application/json
    payload: '{{ payload }}'
    content_type: "application/json"
presence_configure:
    url: "http://localhost:1880/endpoint/presence/"
    method: POST
    headers:
        Content-Type: application/json
    payload: '{{ payload }}'
    content_type: "application/json"
presence_clear_cooldown:
    url: "http://localhost:1880/endpoint/presence/{{ topic }}/clear-cooldown"
    method: POST
    headers:
        Content-Type: application/json
    payload: '{}'
    content_type: "application/json"
presence_clear_all_cooldowns:
    url: "http://localhost:1880/endpoint/presence/clear-all-cooldowns"
    method: POST
    headers:
        Content-Type: application/json
    payload: '{}'
    content_type: "application/json"
clear_static_states:
    url: "http://localhost:1880/endpoint/static-states/clear"
    method: POST
    headers:
        Content-Type: application/json
    payload: '{{ payload }}'
    content_type: "application/json"

- sensor:
  - name: "Plant Schedule Duration"
    unit_of_measurement: "hours"
    state: >
      {% set start = states('input_datetime.plants_global_schedule_start') %} {% set end = states('input_datetime.plants_global_schedule_end') %}

      {% set start_time = strptime(start, '%H:%M:%S') %} {% set end_time = strptime(end, '%H:%M:%S') %}

      {% if end_time < start_time %}
        {% set end_time = end_time + timedelta(days=1) %}
      {% endif %}

      {% set duration = (end_time - start_time).total_seconds() / 3600 %}

      {{ duration | round(2) }}

  - name: "Wakeup Time"
    state: >
      {% set wd = now().weekday() %}
      {% if wd >= 5 %}
        {{ states('input_datetime.weekend_wakeup') }}
      {% else %}
        {{ states('input_datetime.weekday_wakeup') }}
      {% endif %}

  - name: "Sleep Time"
    state: >
      {% set wd = now().weekday() %}
      {% if wd == 4 or wd == 5 %}
        {{ states('input_datetime.weekend_sleep') }}
      {% else %}
        {{ states('input_datetime.weekday_sleep') }}
      {% endif %}

  - name: "Day Type"
    state: >
      {% if now().weekday() >= 5 %}
        weekend
      {% else %}
        weekday
      {% endif %}
    icon: >
      {% if now().weekday() >= 5 %}
        mdi:calendar-weekend
      {% else %}
        mdi:calendar-week
      {% endif %}

  - name: "Day of Week"
    state: >
      {% set days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] %} {{ days[now().weekday()] }}
    icon: >
      {% set icons = ['mdi:calendar-week', 'mdi:calendar-week', 'mdi:calendar-week', 'mdi:calendar-week', 'mdi:calendar-week', 'mdi:calendar-weekend', 'mdi:calendar-weekend'] %} {{ icons[now().weekday()] }}

  - name: "Plants Global Schedule End"
    state: >
      {% if is_state('input_boolean.plants_sync_sleep', 'on') %}
        {{ states('sensor.sleep_time') }}
      {% else %}
        {{ states('input_datetime.plants_global_schedule_end') }}
      {% endif %}

  - name: "Bedroom Plants Schedule Start"
    state: "{{ states('sensor.wakeup_time') }}"

  - name: "Bedroom Plants Schedule End"
    state: "{{ states('sensor.sleep_time') }}"

  - name: "Lights Off Percentage"
    unique_id: lights_off_percentage
    unit_of_measurement: "%"
    state: >
      {% set lights = states.light | map(attribute='state') | list %} {% set off_lights = lights | select('eq', 'off') | list %} {% if lights | length == 0 %}
        0
      {% else %}
        {{ (off_lights | length / lights | length * 100) | round(1) }}
      {% endif %}
    availability: "{{ states.light | list | length > 0 }}"

  - name: "Active Schedule Count"
    unique_id: active_schedule_count_template
    state: >
      {% set ns = namespace(n=0) %}
      {% for s in states.sensor if s.entity_id.startswith('sensor.schedule_')
         and s.entity_id.endswith('_status')
         and s.state in ['active', 'ramp_up', 'ramp_down'] %}
        {% set ns.n = ns.n + 1 %}
      {% endfor %}
      {{ ns.n }}
    icon: mdi:calendar-clock

  - name: "Sunrise"
    unique_id: sunrise
    state: >
      {% set next_rising = state_attr('sun.sun', 'next_rising') %}
      {% if next_rising %}
        {{ as_timestamp(next_rising) | timestamp_custom('%H:%M:%S') }}
      {% else %}
        06:00:00
      {% endif %}
    icon: mdi:weather-sunset-up

  - name: "Sunset"
    unique_id: sunset
    state: >
      {% set next_setting = state_attr('sun.sun', 'next_setting') %}
      {% if next_setting %}
        {{ as_timestamp(next_setting) | timestamp_custom('%H:%M:%S') }}
      {% else %}
        18:00:00
      {% endif %}
    icon: mdi:weather-sunset-down

- light:
    - name: "Office Monitor Light"
      unique_id: office_monitor_light
      state: >-
        {{ (states('input_text.office_monitor_light_state') | from_json).state == 'on' }}
      level: >-
        {{ ((states('input_text.office_monitor_light_state') | from_json).brightness | float) * 255.0 }}
      temperature: >-
        {{ 154 + (((states('input_text.office_monitor_light_state') | from_json).color_temp | float) * (500 - 154)) }}
      turn_on:
        - action: rest_command.remote_light_command
          data:
            domain: "light"
            service: "turn_on"
            controller_id: "remote.office_rm4_mini"
            device: "office_monitor_light"
            entity_id: "light.office_monitor_light"
            state: "on"
      turn_off:
        - action: rest_command.remote_light_command
          data:
            domain: "light"
            service: "turn_off"
            controller_id: "remote.office_rm4_mini"
            device: "office_monitor_light"
            entity_id: "light.office_monitor_light"
            state: "off"
      set_level:
        - action: rest_command.remote_light_command
          data:
            domain: "light"
            service: "turn_on"
            controller_id: "remote.office_rm4_mini"
            device: "office_monitor_light"
            entity_id: "light.office_monitor_light"
            state: "on"
            brightness_pct: "{{ ((brightness | float) / 255.0) * 100.0 }}"
      set_temperature:
        - action: rest_command.remote_light_command
          data:
            domain: "light"
            service: "turn_on"
            controller_id: "remote.office_rm4_mini"
            device: "office_monitor_light"
            entity_id: "light.office_monitor_light"
            state: "on"
            color_temp: "{{ color_temp }}"

- fan:
    - name: "Guest Bedroom Dyson Fan"
      unique_id: guest_bedroom_dyson_fan
      state: >-
        {{ (states('input_text.guest_bedroom_dyson_fan_state') | from_json).state == 'on' }}
      percentage: >-
        {{ (((states('input_text.guest_bedroom_dyson_fan_state') | from_json).speed | float) * 100) | int }}
      preset_mode: >-
        {{ (states('input_text.guest_bedroom_dyson_fan_state') | from_json).preset_mode }}
      oscillating: >-
        {{ (states('input_text.guest_bedroom_dyson_fan_state') | from_json).oscillating }}
      speed_count: 10
      turn_on:
        - action: rest_command.remote_fan_command
          data:
            domain: "fan"
            service: "turn_on"
            controller_id: "remote.guest_bedroom_rm4_mini"
            device: "guest_bedroom_dyson_fan"
            entity_id: "fan.guest_bedroom_dyson_fan"
            state: "on"
            percentage: "100"
      turn_off:
        - action: rest_command.remote_fan_command
          data:
            domain: "fan"
            service: "turn_off"
            controller_id: "remote.guest_bedroom_rm4_mini"
            device: "guest_bedroom_dyson_fan"
            entity_id: "fan.guest_bedroom_dyson_fan"
            state: "off"
            percentage: "0"
      set_percentage:
        - action: rest_command.remote_fan_command
          data:
            domain: "fan"
            service: "turn_on"
            controller_id: "remote.guest_bedroom_rm4_mini"
            device: "guest_bedroom_dyson_fan"
            entity_id: "fan.guest_bedroom_dyson_fan"
            state: "on"
            percentage: "{{ percentage }}"
      set_oscillating:
        - action: rest_command.remote_fan_command
          data:
            domain: "fan"
            service: "oscillate"
            controller_id: "remote.guest_bedroom_rm4_mini"
            device: "guest_bedroom_dyson_fan"
            entity_id: "fan.guest_bedroom_dyson_fan"
            oscillating: "{{ oscillating | bool }}"

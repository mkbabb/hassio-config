# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Recorder configuration - extended retention for diagnostics
recorder:
  purge_keep_days: 30
  commit_interval: 1
  exclude:
    domains:
      - automation
      - updater
    entity_globs:
      - sensor.sun_*
      - sensor.date_*

# Logger configuration - capture more detail
logger:
  default: info
  logs:
    homeassistant.components.zha: warning
    homeassistant.components.zwave_js: warning
    homeassistant.components.lifx: info
    homeassistant.components.mqtt: warning
    zigpy: warning

# Entity customizations
homeassistant:
  customize: !include customize.yaml
  external_url: "http://192.168.1.230:8123"
  internal_url: "http://192.168.1.230:8123"

# Entity Guard - Conditional blocking of entities
entity_guard:

# Scene Rollback - Captures pre-scene state for undo
scene_rollback:

# Include files
group: !include_dir_merge_list group
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
light: !include_dir_merge_list light
fan: !include_dir_merge_list fan
sensor: !include_dir_merge_list sensor
cover: !include cover.yaml
input_boolean: !include input_boolean.yaml
input_datetime: !include input_datetime.yaml
input_select: !include input_select.yaml
input_number: !include input_number.yaml
input_text: !include input_text.yaml
rest_command: !include rest_commands.yaml
binary_sensor: !include binary_sensors.yaml
zone: !include zone.yaml
template: !include template_entities.yaml

# Frontend themes
frontend:
  themes: !include_dir_merge_named themes

# InfluxDB configuration
influxdb:
  host: !secret influxdb_host
  port: !secret influxdb_port
  database: !secret influxdb_database
  username: !secret influxdb_username
  password: !secret influxdb_password
  max_retries: 3
  default_measurement: state
  include:
    domains:
      - sensor
      - binary_sensor
      - climate
      - light
      - switch
      - cover
      - fan
      - lock
      - input_boolean
      - input_number
      - input_select
    entities:
      - person.mike
  exclude:
    entity_globs:
      - sensor.*_battery_temperature
      - sensor.espresense_*_*
    entities:
      - sensor.last_boot
      - sensor.date
